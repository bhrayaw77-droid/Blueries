<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Task Board — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
  /* ═══════════════════════════════════════════════════════════
     CSS VARIABLES — DARK THEME
  ═══════════════════════════════════════════════════════════ */
  :root, [data-theme="dark"] {
    --bg:        #0a0c10; --bg-2:      #0f1218; --bg-3:      #141820;
    --bg-card:   #141820; --bg-card-h: #1a1f2e; --bg-form:   #0f1218;
    --bg-input:  #0a0c10; --bg-modal:  #141820;
    --border:       rgba(255,255,255,0.07);
    --border-focus: rgba(62,207,178,0.45);
    --border-hover: rgba(99,210,190,0.3);
    --accent:       #3ecfb2; --accent-dim:   #2ba08a;
    --accent-glow:  rgba(62,207,178,0.18); --accent-muted: rgba(62,207,178,0.65);
    --text-1: #e8eaf0; --text-2: #8b92a5; --text-3: #545d72;
    --shadow-card:  0 2px 16px rgba(0,0,0,0.45);
    --shadow-lift:  0 8px 32px rgba(0,0,0,0.6);
    --shadow-modal: 0 24px 80px rgba(0,0,0,0.8);
    --priority-low:    rgba(62,207,178,0.15); --priority-low-c:  #3ecfb2;
    --priority-med:    rgba(255,209,102,0.15); --priority-med-c:  #ffd166;
    --priority-high:   rgba(255,107,107,0.15); --priority-high-c: #ff6b6b;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --radius: 12px; --radius-sm: 7px; --radius-lg: 18px;
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  /* LIGHT THEME */
  [data-theme="light"] {
    --bg: #f0f2f7; --bg-2: #e8eaf0; --bg-3: #ffffff;
    --bg-card: #ffffff; --bg-card-h: #f8f9fc; --bg-form: #ffffff;
    --bg-input: #f4f5f9; --bg-modal: #ffffff;
    --border: rgba(0,0,0,0.08); --border-focus: rgba(62,207,178,0.6); --border-hover: rgba(62,207,178,0.4);
    --text-1: #1a1d26; --text-2: #5a6070; --text-3: #9ba0b0;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lift: 0 8px 28px rgba(0,0,0,0.14);
    --shadow-modal: 0 24px 80px rgba(0,0,0,0.22);
  }

  /* ── RESET ──────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg); color: var(--text-1); font-family: var(--font-body);
    min-height: 100vh; transition: background .3s ease, color .3s ease;
    animation: fadeIn .4s ease forwards;
  }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: var(--font-body); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 99px; }

  /* ── KEYFRAMES ──────────────────────────────────────────────── */
  @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
  @keyframes cardIn    { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes cardOut   { to{opacity:0;transform:translateX(20px) scale(.95);max-height:0;margin:0;padding:0} }
  @keyframes ghostPulse{ 0%,100%{opacity:.5} 50%{opacity:1} }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .shake { animation: shake .4s ease !important; border-color: rgba(255,107,107,.5) !important; }

  /* ── BUTTONS ────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: .85rem; font-weight: 500; border-radius: 100px;
    padding: 9px 18px; border: 1.5px solid transparent;
    transition: var(--transition); white-space: nowrap;
    background: none; color: var(--text-2);
  }
  .btn:hover { color: var(--text-1); }
  .btn-home { border-color: var(--border); color: var(--text-2); font-size: .82rem; }
  .btn-home:hover { border-color: var(--border-hover); color: var(--text-1); background: var(--accent-glow); transform: translateY(-1px); }
  .btn-icon { width:36px; height:36px; padding:0; border-radius:50%; border: 1.5px solid var(--border); justify-content:center; color: var(--text-2); }
  .btn-icon:hover { border-color: var(--border-hover); color: var(--accent); background: var(--accent-glow); }
  .btn-add { background: var(--accent); color: #0a0c10 !important; font-weight: 600; border-color: var(--accent); padding: 10px 22px; }
  .btn-add:hover { background: #4edfbf; border-color: #4edfbf; transform: translateY(-1px); box-shadow: 0 0 20px 4px var(--accent-glow); }
  .btn-add:active { transform: translateY(0); }
  .btn-ghost { border-color: var(--border); color: var(--text-2); }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-1); background: rgba(255,255,255,.04); }

  /* ── HEADER ─────────────────────────────────────────────────── */
  .header {
    position: sticky; top:0; z-index:50;
    background: rgba(10,12,16,.9); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px); transition: background .3s ease;
  }
  [data-theme="light"] .header { background: rgba(240,242,247,.92); }
  .header-inner {
    max-width:1400px; margin:0 auto; padding:0 24px; height:62px;
    display:flex; align-items:center; gap:20px;
  }
  .header-brand { display:flex; align-items:center; gap:16px; flex:1; min-width:0; }
  .brand-logo   { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .logo-icon    { font-size:1.1rem; filter:sepia(1) hue-rotate(130deg) saturate(3) brightness(1.1); }
  .logo-text    { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--text-1); letter-spacing:-.02em; }
  .logo-accent  { color:var(--accent); }
  .header-desc  { font-size:.78rem; color:var(--text-3); display:none; }
  @media(min-width:700px){ .header-desc{display:block} }
  .header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  /* ── SEARCH BAR ─────────────────────────────────────────────── */
  .search-bar { max-height:0; overflow:hidden; transition:max-height .35s ease,padding .3s ease; border-top:1px solid transparent; }
  .search-bar.open { max-height:80px; border-top-color:var(--border); padding:10px 24px 12px; }
  .search-inner {
    max-width:600px; margin:0 auto; display:flex; align-items:center; gap:10px;
    background:var(--bg-input); border:1.5px solid var(--border); border-radius:100px;
    padding:8px 16px; transition:border-color var(--transition);
  }
  .search-inner:focus-within { border-color:var(--border-focus); }
  .search-inner svg { color:var(--text-3); flex-shrink:0; }
  #searchInput { flex:1; background:none; border:none; outline:none; color:var(--text-1); font-family:var(--font-body); font-size:.88rem; }
  #searchInput::placeholder { color:var(--text-3); }
  .search-clear { background:none; border:none; color:var(--text-3); font-size:.9rem; padding:0 2px; transition:color var(--transition); line-height:1; }
  .search-clear:hover { color:var(--text-1); }

  /* ── FORM SECTION ───────────────────────────────────────────── */
  .form-section { max-width:1400px; margin:20px auto 0; padding:0 24px; }
  .form-card {
    background:var(--bg-form); border:1px solid var(--border); border-radius:var(--radius-lg);
    overflow:hidden; transition:border-color var(--transition); margin-bottom:20px;
  }
  .form-card:focus-within { border-color:var(--border-focus); }
  .form-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
  .form-title  { font-family:var(--font-display); font-size:.88rem; font-weight:600; color:var(--text-2); display:flex; align-items:center; gap:8px; }
  .form-collapse { background:none; border:none; color:var(--text-3); padding:4px; border-radius:6px; transition:color var(--transition),transform var(--transition); line-height:0; }
  .form-collapse:hover { color:var(--text-1); }
  .form-collapse.collapsed { transform:rotate(-90deg); }
  .form-body {
    padding:16px 20px 18px; display:flex; flex-direction:column; gap:12px;
    transition:max-height .35s ease,opacity .3s ease,padding .3s ease; overflow:hidden;
  }
  .form-body.collapsed { max-height:0!important; padding-top:0; padding-bottom:0; opacity:0; }
  .form-row { display:flex; gap:14px; flex-wrap:wrap; }
  .form-row--actions { align-items:center; justify-content:space-between; }
  .form-group { display:flex; flex-direction:column; gap:6px; flex:1; min-width:140px; }
  .form-group--wide { flex:2; min-width:200px; }
  .form-label  { font-size:.75rem; font-weight:500; color:var(--text-3); letter-spacing:.04em; text-transform:uppercase; }
  .required    { color:#ff6b6b; }
  .optional    { color:var(--text-3); font-style:italic; text-transform:none; }
  .form-input, .form-select, .form-textarea {
    background:var(--bg-input); border:1.5px solid var(--border); border-radius:var(--radius-sm);
    color:var(--text-1); font-family:var(--font-body); font-size:.88rem;
    padding:9px 12px; outline:none; transition:border-color var(--transition),box-shadow var(--transition); width:100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color:var(--border-focus); box-shadow:0 0 0 3px rgba(62,207,178,.1);
  }
  .form-input::placeholder, .form-textarea::placeholder { color:var(--text-3); }
  .form-textarea { resize:vertical; min-height:56px; }
  .form-select {
    appearance:none;
    background-image:url("data:image/svg+xml,%3Csvg width='10' height='7' viewBox='0 0 10 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23545d72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat; background-position:right 12px center;
    padding-right:32px; cursor:pointer;
  }

  /* ── COLOR PICKER ───────────────────────────────────────────── */
  .color-picker { display:flex; gap:8px; flex-wrap:wrap; padding-top:2px; }
  .color-dot {
    width:22px; height:22px; border-radius:50%; border:2px solid transparent;
    transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition); outline:none;
  }
  .color-dot:hover { transform:scale(1.2); }
  .color-dot.active { border-color:var(--text-1); box-shadow:0 0 0 2px var(--bg-input),0 0 0 4px var(--text-1); transform:scale(1.1); }

  /* ── FILTER BAR ─────────────────────────────────────────────── */
  .filter-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .filter-label { font-size:.75rem; color:var(--text-3); font-weight:500; }
  .filter-btn {
    background:none; border:1.5px solid var(--border); border-radius:100px;
    color:var(--text-2); font-family:var(--font-body); font-size:.75rem; font-weight:500;
    padding:5px 12px; transition:var(--transition);
  }
  .filter-btn:hover { border-color:var(--border-hover); color:var(--text-1); }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#0a0c10; }

  /* ── BOARD ──────────────────────────────────────────────────── */
  .board {
    max-width:1400px; margin:0 auto; padding:0 24px 40px;
    display:grid; grid-template-columns:repeat(3,1fr); gap:20px; align-items:start;
  }

  /* ── COLUMN ─────────────────────────────────────────────────── */
  .column {
    background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-lg);
    overflow:hidden; transition:border-color var(--transition); min-height:200px;
    display:flex; flex-direction:column;
  }
  .column.drag-over { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow),inset 0 0 30px rgba(62,207,178,.04); }
  .column-header { padding:16px 16px 0; }
  .column-title-row { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .column-dot   { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .column-title { font-family:var(--font-display); font-size:.88rem; font-weight:700; color:var(--text-2); letter-spacing:.04em; text-transform:uppercase; flex:1; }
  .column-count {
    background:var(--bg-3); border:1px solid var(--border); border-radius:100px;
    font-size:.7rem; font-weight:600; color:var(--text-2); padding:2px 8px;
    font-family:var(--font-display); min-width:24px; text-align:center;
  }
  .column-bar { height:2px; border-radius:2px; margin-bottom:12px; opacity:.7; }
  .column-body { flex:1; padding:4px 12px 12px; min-height:80px; display:flex; flex-direction:column; gap:9px; }
  .column-empty {
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:24px 16px 28px; text-align:center; gap:8px;
    color:var(--text-3); font-size:.8rem; line-height:1.5;
  }
  .column-empty.visible { display:flex; }
  .empty-icon { font-size:1.8rem; opacity:.5; }

  /* ── TASK CARD ──────────────────────────────────────────────── */
  .task-card {
    background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 14px 12px; cursor:grab;
    transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition),opacity var(--transition);
    position:relative; overflow:hidden; animation:cardIn .3s ease forwards;
  }
  .task-card:hover  { transform:translateY(-2px); border-color:var(--border-hover); box-shadow:var(--shadow-lift); }
  .task-card:active { cursor:grabbing; }
  .task-card.dragging { opacity:.4; transform:scale(.97); cursor:grabbing; }
  .task-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--card-color, var(--accent)); border-radius:3px 0 0 3px;
  }
  .card-top     { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .card-title   { font-family:var(--font-display); font-size:.88rem; font-weight:600; color:var(--text-1); line-height:1.35; flex:1; word-break:break-word; }
  .card-desc    { font-size:.78rem; color:var(--text-2); line-height:1.55; margin-bottom:10px; word-break:break-word; }
  .card-footer  { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .card-priority {
    display:inline-flex; align-items:center; gap:5px;
    font-size:.68rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
    padding:3px 8px; border-radius:100px;
  }
  .priority-low    { background:var(--priority-low);  color:var(--priority-low-c);  }
  .priority-medium { background:var(--priority-med);  color:var(--priority-med-c);  }
  .priority-high   { background:var(--priority-high); color:var(--priority-high-c); }
  .card-actions { display:flex; gap:4px; opacity:0; transition:opacity var(--transition); }
  .task-card:hover .card-actions { opacity:1; }
  .card-btn {
    background:none; border:1px solid transparent; border-radius:var(--radius-sm);
    width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    font-size:.75rem; color:var(--text-3); transition:var(--transition);
  }
  .card-btn:hover        { border-color:var(--border); color:var(--text-1); background:var(--bg-2); }
  .card-btn--delete:hover{ border-color:rgba(255,107,107,.3); color:#ff6b6b; background:rgba(255,107,107,.08); }
  .card-btn--edit:hover  { border-color:rgba(82,140,255,.3);  color:#528cff; background:rgba(82,140,255,.08); }

  /* ── DROP GHOST ─────────────────────────────────────────────── */
  .drop-ghost {
    height:56px; border:2px dashed var(--accent); border-radius:var(--radius);
    background:rgba(62,207,178,.04); animation:ghostPulse 1s ease infinite;
  }

  /* ── MODAL ──────────────────────────────────────────────────── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--bg-modal); border:1px solid var(--border); border-radius:var(--radius-lg);
    width:100%; max-width:480px; box-shadow:var(--shadow-modal);
    transform:translateY(20px) scale(.97); transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.open .modal { transform:translateY(0) scale(1); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border); }
  .modal-title  { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--text-1); }
  .modal-close  { background:none; border:none; color:var(--text-3); font-size:1rem; width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
  .modal-close:hover { color:var(--text-1); background:var(--bg-2); }
  .modal-body   { padding:20px; display:flex; flex-direction:column; gap:14px; }
  .modal-footer { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

  /* ── TOAST ──────────────────────────────────────────────────── */
  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg-card); border:1px solid var(--border); border-radius:100px;
    padding:10px 20px; font-size:.82rem; font-weight:500; color:var(--text-1);
    box-shadow:var(--shadow-lift); opacity:0; transition:opacity .3s ease,transform .3s ease;
    z-index:300; pointer-events:none; white-space:nowrap;
  }
  .toast.show    { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(62,207,178,.4);  color:var(--accent); }
  .toast.error   { border-color:rgba(255,107,107,.4); color:#ff6b6b; }
  .toast.info    { border-color:rgba(82,140,255,.4);  color:#528cff; }

  /* ── RESPONSIVE ─────────────────────────────────────────────── */
  @media(max-width:900px){
    .board{ grid-template-columns:1fr; padding-bottom:60px; }
    .form-row{ flex-direction:column; }
    .form-group--wide{ min-width:unset; }
    .form-row--actions{ flex-direction:column; align-items:flex-start; gap:12px; }
    .btn-add{ width:100%; justify-content:center; }
  }
  @media(max-width:560px){
    .header-inner{ padding:0 14px; gap:12px; }
    .form-section{ padding:0 14px; }
    .board{ padding:0 14px 40px; }
  }
  </style>
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <a href="index.html" class="brand-logo">
          <span class="logo-icon">⬛</span>
          <span class="logo-text">Kanban<span class="logo-accent">Board</span></span>
        </a>
        <p class="header-desc">Manage your tasks visually and track progress easily.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" id="searchToggle" title="Search tasks" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="btn btn-icon" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 10A6 6 0 016 2.5 6 6 0 1013.5 10z" stroke="currentColor" stroke-width="1.5"/></svg>
          <svg class="icon-sun"  width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <a href="index.html" class="btn btn-home">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7L7 1L13 7M2.5 5.5V12.5H5.5V9H8.5V12.5H11.5V5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Home
        </a>
      </div>
    </div>
    <div class="search-bar" id="searchBar">
      <div class="search-inner">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="Search tasks by title or description…" autocomplete="off" />
        <button class="search-clear" id="searchClear" title="Clear">✕</button>
      </div>
    </div>
  </header>

  <!-- ── TASK FORM ───────────────────────────────────────────── -->
  <section class="form-section">
    <div class="form-card">
      <div class="form-header">
        <h2 class="form-title">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 5.5V9.5M9 12h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          New Task
        </h2>
        <button class="form-collapse" id="formCollapse" title="Collapse form">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5L7 10L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="form-body" id="formBody">
        <div class="form-row">
          <div class="form-group form-group--wide">
            <label class="form-label" for="taskTitle">Task Title <span class="required">*</span></label>
            <input type="text" id="taskTitle" class="form-input" placeholder="e.g. Design landing page…" autocomplete="off" maxlength="80" />
          </div>
          <div class="form-group">
            <label class="form-label" for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group--wide">
            <label class="form-label" for="taskDesc">Description <span class="optional">(optional)</span></label>
            <textarea id="taskDesc" class="form-textarea" placeholder="Add more details about this task…" rows="2" maxlength="200"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Color Tag</label>
            <div class="color-picker" id="colorPicker">
              <button class="color-dot active" data-color="#3ecfb2" style="background:#3ecfb2" title="Teal"></button>
              <button class="color-dot" data-color="#528cff" style="background:#528cff" title="Blue"></button>
              <button class="color-dot" data-color="#ff6b6b" style="background:#ff6b6b" title="Red"></button>
              <button class="color-dot" data-color="#ffd166" style="background:#ffd166" title="Yellow"></button>
              <button class="color-dot" data-color="#c084fc" style="background:#c084fc" title="Purple"></button>
              <button class="color-dot" data-color="#fb923c" style="background:#fb923c" title="Orange"></button>
            </div>
          </div>
        </div>
        <div class="form-row form-row--actions">
          <div class="filter-bar">
            <span class="filter-label">Filter:</span>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="low">Low</button>
            <button class="filter-btn" data-filter="medium">Medium</button>
            <button class="filter-btn" data-filter="high">High</button>
          </div>
          <button class="btn btn-add" id="addTaskBtn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1V14M1 7.5H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Add Task
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- ── KANBAN BOARD ────────────────────────────────────────── -->
  <main class="board" id="board">

    <div class="column" id="col-todo" data-column="todo">
      <div class="column-header">
        <div class="column-title-row">
          <span class="column-dot" style="background:#528cff"></span>
          <h3 class="column-title">To Do</h3>
          <span class="column-count" id="count-todo">0</span>
        </div>
        <div class="column-bar" style="background:#528cff"></div>
      </div>
      <div class="column-body" id="cards-todo"></div>
      <div class="column-empty" id="empty-todo">
        <div class="empty-icon">📋</div><p>No tasks yet.<br/>Add one above!</p>
      </div>
    </div>

    <div class="column" id="col-doing" data-column="doing">
      <div class="column-header">
        <div class="column-title-row">
          <span class="column-dot" style="background:#ffd166"></span>
          <h3 class="column-title">Doing</h3>
          <span class="column-count" id="count-doing">0</span>
        </div>
        <div class="column-bar" style="background:#ffd166"></div>
      </div>
      <div class="column-body" id="cards-doing"></div>
      <div class="column-empty" id="empty-doing">
        <div class="empty-icon">⚡</div><p>Nothing in progress.<br/>Drag a task here!</p>
      </div>
    </div>

    <div class="column" id="col-done" data-column="done">
      <div class="column-header">
        <div class="column-title-row">
          <span class="column-dot" style="background:#3ecfb2"></span>
          <h3 class="column-title">Done</h3>
          <span class="column-count" id="count-done">0</span>
        </div>
        <div class="column-bar" style="background:#3ecfb2"></div>
      </div>
      <div class="column-body" id="cards-done"></div>
      <div class="column-empty" id="empty-done">
        <div class="empty-icon">✅</div><p>Nothing completed yet.<br/>Keep going!</p>
      </div>
    </div>

  </main>

  <!-- ── EDIT MODAL ──────────────────────────────────────────── -->
  <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-label="Edit Task">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Task</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label class="form-label" for="editTitle">Task Title <span class="required">*</span></label>
          <input type="text" id="editTitle" class="form-input" maxlength="80" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editDesc">Description</label>
          <textarea id="editDesc" class="form-textarea" rows="3" maxlength="200"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="editPriority">Priority</label>
            <select id="editPriority" class="form-select">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Color Tag</label>
            <div class="color-picker" id="editColorPicker">
              <button class="color-dot" data-color="#3ecfb2" style="background:#3ecfb2"></button>
              <button class="color-dot" data-color="#528cff" style="background:#528cff"></button>
              <button class="color-dot" data-color="#ff6b6b" style="background:#ff6b6b"></button>
              <button class="color-dot" data-color="#ffd166" style="background:#ffd166"></button>
              <button class="color-dot" data-color="#c084fc" style="background:#c084fc"></button>
              <button class="color-dot" data-color="#fb923c" style="background:#fb923c"></button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-add"   id="modalSave">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════════════════════════════════
       JAVASCRIPT — all app logic
  ═══════════════════════════════════════════════════════════ -->
  <script>
  console.log('%c 🗂  Kanban Task Board — Ready ', 'background:#3ecfb2;color:#0a0c10;font-size:13px;font-weight:bold;padding:5px 10px;border-radius:4px');

  /* ── CONSTANTS & STATE ──────────────────────────────────────── */
  const STORAGE_KEY = 'kanban-tasks-v2';
  const THEME_KEY   = 'kanban-theme';
  const COLUMNS     = ['todo','doing','done'];

  let tasks         = [];
  let draggedId     = null;
  let dragOverCol   = null;
  let ghostEl       = null;
  let activeFilter  = 'all';
  let searchQuery   = '';
  let selectedColor = '#3ecfb2';
  let editColor     = '#3ecfb2';
  let toastTimer    = null;

  /* ── HELPERS ────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const DOM = {
    taskTitle:    () => $('taskTitle'),    taskDesc:     () => $('taskDesc'),
    taskPriority: () => $('taskPriority'), addBtn:       () => $('addTaskBtn'),
    themeToggle:  () => $('themeToggle'),  searchToggle: () => $('searchToggle'),
    searchBar:    () => $('searchBar'),    searchInput:  () => $('searchInput'),
    searchClear:  () => $('searchClear'),  formCollapse: () => $('formCollapse'),
    formBody:     () => $('formBody'),     editModal:    () => $('editModal'),
    editId:       () => $('editId'),       editTitle:    () => $('editTitle'),
    editDesc:     () => $('editDesc'),     editPriority: () => $('editPriority'),
    modalClose:   () => $('modalClose'),   modalCancel:  () => $('modalCancel'),
    modalSave:    () => $('modalSave'),    toast:        () => $('toast'),
    cards: c => $(`cards-${c}`), count: c => $(`count-${c}`),
    empty: c => $(`empty-${c}`), col:   c => $(`col-${c}`),
  };

  function escHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── STORAGE ────────────────────────────────────────────────── */
  function saveTasks(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
    catch(e){ console.error('Save failed:',e); }
  }
  function loadTasks(){
    try{ const r=localStorage.getItem(STORAGE_KEY); tasks=r?JSON.parse(r):[]; }
    catch(e){ tasks=[]; }
  }

  /* ── CREATE ─────────────────────────────────────────────────── */
  function createTask(){
    const el=DOM.taskTitle(), title=el.value.trim();
    if(!title){
      el.focus(); el.classList.add('shake');
      showToast('Please enter a task title!','error');
      setTimeout(()=>el.classList.remove('shake'),500); return;
    }
    tasks.unshift({
      id:`task-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      title, description:DOM.taskDesc().value.trim(),
      priority:DOM.taskPriority().value, color:selectedColor,
      column:'todo', createdAt:Date.now()
    });
    saveTasks(); renderBoard(); resetForm();
    showToast('Task created! ✓','success');
  }

  function resetForm(){
    DOM.taskTitle().value=''; DOM.taskDesc().value='';
    DOM.taskPriority().value='medium';
    setActiveColor(document.querySelector('#colorPicker .color-dot'),'#3ecfb2','create');
  }

  /* ── DELETE ─────────────────────────────────────────────────── */
  function deleteTask(id){
    const task=tasks.find(t=>t.id===id); if(!task) return;
    if(!confirm(`Delete "${task.title}"?\nThis cannot be undone.`)) return;
    const card=document.querySelector(`[data-id="${id}"]`);
    if(card){
      card.style.animation='cardOut .25s ease forwards';
      setTimeout(()=>{ tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderBoard(); showToast('Task deleted.','info'); },220);
    } else { tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderBoard(); }
  }

  /* ── EDIT ───────────────────────────────────────────────────── */
  function openEditModal(id){
    const task=tasks.find(t=>t.id===id); if(!task) return;
    DOM.editId().value=id; DOM.editTitle().value=task.title;
    DOM.editDesc().value=task.description||''; DOM.editPriority().value=task.priority;
    editColor=task.color||'#3ecfb2';
    document.querySelectorAll('#editColorPicker .color-dot')
      .forEach(d=>d.classList.toggle('active',d.dataset.color===editColor));
    DOM.editModal().classList.add('open');
    setTimeout(()=>DOM.editTitle().focus(),100);
  }
  function closeEditModal(){ DOM.editModal().classList.remove('open'); }
  function saveEdit(){
    const id=DOM.editId().value, title=DOM.editTitle().value.trim();
    if(!title){ DOM.editTitle().focus(); showToast('Title cannot be empty!','error'); return; }
    const idx=tasks.findIndex(t=>t.id===id); if(idx===-1) return;
    tasks[idx]={...tasks[idx],title,description:DOM.editDesc().value.trim(),priority:DOM.editPriority().value,color:editColor};
    saveTasks(); renderBoard(); closeEditModal();
    showToast('Task updated! ✓','success');
  }

  /* ── RENDER ─────────────────────────────────────────────────── */
  function buildCardHTML(task){
    const labels={low:'🟢 Low',medium:'🟡 Medium',high:'🔴 High'};
    const desc=task.description?`<p class="card-desc">${escHtml(task.description)}</p>`:'';
    return `<div class="task-card" data-id="${task.id}" data-column="${task.column}"
         style="--card-color:${task.color||'var(--accent)'}" draggable="true"
         role="listitem" aria-label="${escHtml(task.title)}">
      <div class="card-top">
        <h4 class="card-title">${escHtml(task.title)}</h4>
        <div class="card-actions">
          <button class="card-btn card-btn--edit"   title="Edit"   data-action="edit"   data-id="${task.id}">✏️</button>
          <button class="card-btn card-btn--delete" title="Delete" data-action="delete" data-id="${task.id}">🗑️</button>
        </div>
      </div>${desc}
      <div class="card-footer">
        <span class="card-priority priority-${task.priority}">${labels[task.priority]||''}</span>
      </div>
    </div>`;
  }

  function renderBoard(){
    const q=searchQuery.toLowerCase();
    COLUMNS.forEach(col=>{
      const colTasks=tasks.filter(t=>{
        if(t.column!==col) return false;
        if(activeFilter!=='all'&&t.priority!==activeFilter) return false;
        if(q&&!t.title.toLowerCase().includes(q)&&!(t.description||'').toLowerCase().includes(q)) return false;
        return true;
      });
      DOM.cards(col).innerHTML=colTasks.map(buildCardHTML).join('');
      DOM.count(col).textContent=colTasks.length;
      DOM.empty(col).classList.toggle('visible', tasks.filter(t=>t.column===col).length===0);
      DOM.cards(col).querySelectorAll('.task-card').forEach(bindDragEvents);
    });
  }

  /* ── DRAG & DROP ────────────────────────────────────────────── */
  function bindDragEvents(card){
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend',   onDragEnd);
  }
  function onDragStart(e){
    draggedId=this.dataset.id; this.classList.add('dragging');
    e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',draggedId);
  }
  function onDragEnd(){
    this.classList.remove('dragging'); removeGhost();
    COLUMNS.forEach(c=>DOM.col(c).classList.remove('drag-over'));
    draggedId=null; dragOverCol=null;
  }
  function initColumnDrop(){
    COLUMNS.forEach(col=>{
      const colEl=DOM.col(col), bodyEl=DOM.cards(col);
      colEl.addEventListener('dragover',e=>{
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        if(dragOverCol!==col){
          COLUMNS.forEach(c=>DOM.col(c).classList.remove('drag-over'));
          colEl.classList.add('drag-over'); dragOverCol=col;
        }
        const after=getDragAfterElement(bodyEl,e.clientY);
        removeGhost(); ghostEl=document.createElement('div'); ghostEl.className='drop-ghost';
        after?bodyEl.insertBefore(ghostEl,after):bodyEl.appendChild(ghostEl);
      });
      colEl.addEventListener('dragleave',e=>{
        if(!colEl.contains(e.relatedTarget)){
          colEl.classList.remove('drag-over'); removeGhost();
          if(dragOverCol===col) dragOverCol=null;
        }
      });
      colEl.addEventListener('drop',e=>{
        e.preventDefault(); colEl.classList.remove('drag-over'); removeGhost();
        if(!draggedId) return;
        const idx=tasks.findIndex(t=>t.id===draggedId); if(idx===-1) return;
        tasks[idx].column=col;
        const after=getDragAfterElement(bodyEl,e.clientY);
        const moved=tasks.splice(idx,1)[0];
        if(!after){
          const last=tasks.reduce((l,t,i)=>(t.column===col?i:l),-1);
          tasks.splice(last+1,0,moved);
        } else {
          tasks.splice(tasks.findIndex(t=>t.id===after.dataset.id),0,moved);
        }
        saveTasks(); renderBoard();
      });
    });
  }
  function getDragAfterElement(container,y){
    return [...container.querySelectorAll('.task-card:not(.dragging)')]
      .reduce((closest,child)=>{
        const box=child.getBoundingClientRect(), offset=y-box.top-box.height/2;
        return offset<0&&offset>closest.offset?{offset,element:child}:closest;
      },{offset:Number.NEGATIVE_INFINITY}).element;
  }
  function removeGhost(){
    if(ghostEl&&ghostEl.parentNode) ghostEl.parentNode.removeChild(ghostEl);
    ghostEl=null;
  }

  /* ── COLOR PICKER ───────────────────────────────────────────── */
  function setActiveColor(dotEl,color,type){
    const sel=type==='edit'?'#editColorPicker':'#colorPicker';
    document.querySelectorAll(`${sel} .color-dot`).forEach(d=>d.classList.remove('active'));
    if(dotEl) dotEl.classList.add('active');
    if(type==='edit') editColor=color; else selectedColor=color;
  }
  function initColorPickers(){
    document.querySelectorAll('#colorPicker .color-dot').forEach(d=>
      d.addEventListener('click',()=>setActiveColor(d,d.dataset.color,'create')));
    document.querySelectorAll('#editColorPicker .color-dot').forEach(d=>
      d.addEventListener('click',()=>setActiveColor(d,d.dataset.color,'edit')));
  }

  /* ── FILTER & SEARCH ────────────────────────────────────────── */
  function initFilters(){
    document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); activeFilter=btn.dataset.filter; renderBoard();
    }));
  }
  function initSearch(){
    const bar=DOM.searchBar(), input=DOM.searchInput();
    DOM.searchToggle().addEventListener('click',()=>{
      bar.classList.toggle('open');
      if(bar.classList.contains('open')) setTimeout(()=>input.focus(),150);
      else { searchQuery=''; input.value=''; renderBoard(); }
    });
    input.addEventListener('input',()=>{ searchQuery=input.value; renderBoard(); });
    DOM.searchClear().addEventListener('click',()=>{ input.value=''; searchQuery=''; input.focus(); renderBoard(); });
    input.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ bar.classList.remove('open'); searchQuery=''; input.value=''; renderBoard(); }
    });
  }

  /* ── THEME ──────────────────────────────────────────────────── */
  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem(THEME_KEY,theme);
    document.querySelector('.icon-moon').style.display=theme==='dark'?'':'none';
    document.querySelector('.icon-sun').style.display =theme==='dark'?'none':'';
  }
  function initTheme(){
    applyTheme(localStorage.getItem(THEME_KEY)||'dark');
    DOM.themeToggle().addEventListener('click',()=>
      applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));
  }

  /* ── TOAST ──────────────────────────────────────────────────── */
  function showToast(msg,type='info'){
    const el=DOM.toast(); el.textContent=msg; el.className=`toast show ${type}`;
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
  }

  /* ── FORM COLLAPSE ──────────────────────────────────────────── */
  function initFormCollapse(){
    const btn=DOM.formCollapse(), body=DOM.formBody();
    btn.addEventListener('click',()=>{
      const c=body.classList.toggle('collapsed');
      btn.classList.toggle('collapsed',c); btn.title=c?'Expand form':'Collapse form';
    });
  }

  /* ── MODAL ──────────────────────────────────────────────────── */
  function initModal(){
    DOM.modalClose().addEventListener('click',closeEditModal);
    DOM.modalCancel().addEventListener('click',closeEditModal);
    DOM.modalSave().addEventListener('click',saveEdit);
    DOM.editTitle().addEventListener('keydown',e=>{ if(e.key==='Enter') saveEdit(); });
    DOM.editModal().addEventListener('click',e=>{ if(e.target===DOM.editModal()) closeEditModal(); });
  }

  /* ── KEYBOARD ───────────────────────────────────────────────── */
  function initKeyboard(){
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape'&&DOM.editModal().classList.contains('open')) closeEditModal();
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
        const a=document.activeElement;
        if(a===DOM.taskTitle()||a===DOM.taskDesc()) createTask();
      }
    });
    DOM.taskTitle().addEventListener('keydown',e=>{ if(e.key==='Enter') createTask(); });
  }

  /* ── CARD DELEGATION ────────────────────────────────────────── */
  function initCardDelegation(){
    $('board').addEventListener('click',e=>{
      const btn=e.target.closest('[data-action]'); if(!btn) return;
      if(btn.dataset.action==='edit')   openEditModal(btn.dataset.id);
      if(btn.dataset.action==='delete') deleteTask(btn.dataset.id);
    });
  }

  /* ── BOOT ───────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded',()=>{
    loadTasks(); initTheme(); renderBoard();
    initColumnDrop(); initColorPickers(); initFilters();
    initSearch(); initFormCollapse(); initCardDelegation();
    initKeyboard(); initModal();
    DOM.addBtn().addEventListener('click',createTask);
    console.log(`%c ✅ Board ready — ${tasks.length} task(s) loaded `,'background:#0f1218;color:#3ecfb2;font-size:12px;padding:4px 8px;border-radius:4px');
  });
  </script>
</body>
</html>
